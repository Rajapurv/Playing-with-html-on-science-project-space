
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:var(--font-sans)}
#sim-wrap{position:relative;width:100%;height:600px;background:#000;border-radius:8px;overflow:hidden;border:0.5px solid #333}
canvas{display:block;width:100%;height:100%}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#controls{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.82);border:0.5px solid #333;border-radius:8px;padding:10px 12px;pointer-events:all;width:200px;font-size:12px}
#controls h3{font-size:13px;font-weight:500;color:#fff;margin-bottom:8px;border-bottom:0.5px solid #333;padding-bottom:6px}
.ctrl-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:6px}
.ctrl-row label{color:#aaa;font-size:11px;min-width:60px}
.ctrl-row input[type=range]{flex:1;height:3px}
.ctrl-row span{color:#fff;font-size:11px;min-width:28px;text-align:right}
.ctrl-row select{flex:1;font-size:11px;background:#111;color:#fff;border:0.5px solid #444;border-radius:4px;padding:2px}
.btn-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.btn{font-size:10px;padding:4px 7px;border-radius:4px;border:0.5px solid #555;background:#111;color:#ccc;cursor:pointer}
.btn:hover{background:#222;color:#fff}
.btn.active{background:#1a1a3e;border-color:#4466ff;color:#88aaff}
.btn.danger{border-color:#ff4444;color:#ff8888}

#info{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.82);border:0.5px solid #333;border-radius:8px;padding:10px 12px;pointer-events:all;width:180px;font-size:11px}
#info h3{font-size:12px;font-weight:500;margin-bottom:6px;color:#fff;border-bottom:0.5px solid #333;padding-bottom:5px}
.info-row{display:flex;justify-content:space-between;margin-bottom:3px}
.info-key{color:#888}
.info-val{color:#4af;font-family:var(--font-mono)}
#legend{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,0.75);border:0.5px solid #333;border-radius:6px;padding:7px 10px;font-size:10px;pointer-events:none;display:flex;gap:10px}
.leg-item{display:flex;align-items:center;gap:4px;color:#aaa}
.leg-dot{width:8px;height:8px;border-radius:50%}
#tooltip{position:absolute;background:rgba(0,0,0,0.88);border:0.5px solid #555;border-radius:6px;padding:6px 10px;font-size:11px;color:#ddd;pointer-events:none;display:none;z-index:10}
#status{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.75);border:0.5px solid #333;border-radius:6px;padding:5px 10px;font-size:10px;color:#888}
</style>

<div id="sim-wrap">
  <canvas id="c"></canvas>
  <div id="ui">
    <div id="controls">
      <h3><i class="ti ti-universe" aria-hidden="true"></i> Space Simulator</h3>
      <div class="ctrl-row"><label>Time speed</label><input type="range" id="spd" min="0.1" max="5" step="0.1" value="1"><span id="spd-v">1.0x</span></div>
      <div class="ctrl-row"><label>Photons</label><input type="range" id="phot" min="0" max="80" step="1" value="30"><span id="phot-v">30</span></div>
      <div class="ctrl-row"><label>Zoom</label><input type="range" id="zoom" min="0.3" max="3" step="0.05" value="1"><span id="zoom-v">1.0x</span></div>
      <div class="ctrl-row"><label>Add object</label>
        <select id="add-sel">
          <option value="planet">Planet</option>
          <option value="star">Star</option>
          <option value="blackhole">Black hole</option>
          <option value="asteroid">Asteroid</option>
          <option value="comet">Comet</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn" id="btn-add">+ Add</button>
        <button class="btn active" id="btn-rings">Rings</button>
        <button class="btn active" id="btn-trails">Trails</button>
        <button class="btn" id="btn-grav">Gravity lines</button>
      </div>
      <div class="btn-row">
        <button class="btn" id="btn-supernova">Supernova</button>
        <button class="btn danger" id="btn-reset">Reset</button>
      </div>
      <div style="margin-top:8px;color:#666;font-size:10px">Click planet → drag to black hole<br>Right-click to remove object<br>Middle-click drag to pan</div>
    </div>
    <div id="info">
      <h3>System data</h3>
      <div class="info-row"><span class="info-key">Objects</span><span class="info-val" id="i-obj">0</span></div>
      <div class="info-row"><span class="info-key">Photons</span><span class="info-val" id="i-phot">0</span></div>
      <div class="info-row"><span class="info-key">Time</span><span class="info-val" id="i-time">0</span></div>
      <div class="info-row"><span class="info-key">Zoom</span><span class="info-val" id="i-zoom">1.00</span></div>
      <div class="info-row"><span class="info-key">Collisions</span><span class="info-val" id="i-col">0</span></div>
      <div class="info-row"><span class="info-key">Mode</span><span class="info-val" id="i-mode">Normal</span></div>
      <div class="info-row"><span class="info-key">Selected</span><span class="info-val" id="i-sel">—</span></div>
    </div>
    <div id="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#ffd700"></div>Star</div>
      <div class="leg-item"><div class="leg-dot" style="background:#4488ff"></div>Planet</div>
      <div class="leg-item"><div class="leg-dot" style="background:#ff4444"></div>Black hole</div>
      <div class="leg-item"><div class="leg-dot" style="background:#aaa"></div>Asteroid</div>
      <div class="leg-item"><div class="leg-dot" style="background:#88ffdd"></div>Photon</div>
    </div>
    <div id="status">Ready — scroll to zoom | drag to pan</div>
    <div id="tooltip"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('sim-wrap');

let W, H;
function resize(){
  W = canvas.width = wrap.clientWidth;
  H = canvas.height = wrap.clientHeight;
}
resize();
window.addEventListener('resize', resize);

let zoom = 1, panX = 0, panY = 0;
let timeSpeed = 1, photonCount = 30, showRings = true, showTrails = true, showGrav = false;
let simTime = 0, collisions = 0;
let selected = null, dragging = false, dragStart = {x:0,y:0};
let isPanning = false, panStart = {x:0,y:0}, panOrig = {x:0,y:0};

const bodies = [];
const photons = [];
const particles = [];
const explosions = [];

let uidCtr = 0;
function uid(){ return ++uidCtr; }

function worldToScreen(wx, wy){
  return {x: (wx + panX) * zoom + W/2, y: (wy + panY) * zoom + H/2};
}
function screenToWorld(sx, sy){
  return {x: (sx - W/2) / zoom - panX, y: (sy - H/2) / zoom - panY};
}

const PLANET_COLORS = ['#4488ff','#44ffaa','#ff8844','#cc44ff','#44ccff','#ff4488','#ffcc44','#88ff44'];
const RING_COLORS = ['rgba(200,180,120,0.35)','rgba(150,200,255,0.3)','rgba(255,150,100,0.3)','rgba(200,100,255,0.28)'];

function makeStar(wx, wy, mass=1){
  return {id:uid(), type:'star', x:wx, y:wy, vx:0, vy:0, mass: mass * 2000, radius: 28+mass*8,
    color:'#fff', coreColor:'#ffffcc', coronaColor:'rgba(255,220,80,0.15)',
    name:'Star-'+uid(), trail:[], rings:false, temp:5778, luminosity:1};
}

function makePlanet(star, angle, dist, mass=1){
  const spd = Math.sqrt(star.mass * 0.0003 / dist);
  const vx = -Math.sin(angle) * spd;
  const vy = Math.cos(angle) * spd;
  const col = PLANET_COLORS[Math.floor(Math.random()*PLANET_COLORS.length)];
  const r = 7 + Math.random()*10 * mass;
  const hasRings = Math.random() > 0.55;
  return {id:uid(), type:'planet', x: star.x + Math.cos(angle)*dist, y: star.y + Math.sin(angle)*dist,
    vx, vy, mass: mass*80+20, radius: r, color: col, name:'Planet-'+uid(),
    trail:[], rings: hasRings,
    ringColor: RING_COLORS[Math.floor(Math.random()*RING_COLORS.length)],
    ringTilt: (Math.random()-0.5)*0.6, ringWidth: r*2.2+Math.random()*r};
}

function makeBlackHole(wx, wy, mass=1){
  return {id:uid(), type:'blackhole', x:wx, y:wy, vx:0, vy:0, mass: mass*5000,
    radius: 18+mass*6, name:'BH-'+uid(), trail:[], consuming:false,
    spinAngle:0, accretionParticles:[]};
}

function makeAsteroid(star, angle, dist){
  const spd = Math.sqrt(star.mass * 0.00035 / dist);
  return {id:uid(), type:'asteroid', x: star.x + Math.cos(angle)*dist, y: star.y + Math.sin(angle)*dist,
    vx: -Math.sin(angle)*spd*(0.8+Math.random()*0.4), vy: Math.cos(angle)*spd*(0.8+Math.random()*0.4),
    mass:5+Math.random()*10, radius:2+Math.random()*3, color:'#aaa', name:'Ast-'+uid(), trail:[]};
}

function makeComet(wx, wy){
  const angle = Math.random()*Math.PI*2;
  return {id:uid(), type:'comet', x:wx, y:wy,
    vx: Math.cos(angle)*1.5, vy: Math.sin(angle)*1.5,
    mass:15, radius:4, color:'#ccffff', name:'Comet-'+uid(), trail:[], tailLen:0};
}

function initSystem(){
  bodies.length=0; photons.length=0; particles.length=0; explosions.length=0;
  collisions=0; simTime=0; panX=0; panY=0; zoom=1; selected=null;
  document.getElementById('zoom').value=1;

  const star1 = makeStar(-120, 0, 1.2);
  const star2 = makeStar(120, 0, 1.2);
  star1.vx=0; star1.vy=0.35;
  star2.vx=0; star2.vy=-0.35;
  bodies.push(star1, star2);

  const dists = [80,130,195,265,340,420];
  const masses = [0.6,1.0,0.8,1.4,1.1,0.5];
  for(let i=0;i<6;i++){
    const angle = Math.random()*Math.PI*2;
    bodies.push(makePlanet(star1, angle, dists[i], masses[i]));
  }
  for(let i=0;i<4;i++){
    bodies.push(makeAsteroid(star1, Math.random()*Math.PI*2, 90+Math.random()*350));
  }
}

initSystem();

function spawnPhotons(){
  const stars = bodies.filter(b=>b.type==='star');
  stars.forEach(star=>{
    const count = Math.floor(photonCount / stars.length);
    for(let i=0;i<count;i++){
      const a = Math.random()*Math.PI*2;
      const spd = 3.5 + Math.random()*2;
      photons.push({x:star.x, y:star.y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
        life:1, maxLife:1, age:0, maxAge:120+Math.random()*80, color:`hsl(${40+Math.random()*20},100%,${70+Math.random()*20}%)`});
    }
  });
}

function emitParticle(x,y,color,vx,vy){
  particles.push({x,y,vx:vx+(Math.random()-0.5)*2,vy:vy+(Math.random()-0.5)*2,
    life:1, color, size:1+Math.random()*2});
}

function drawStar(b){
  const {x,y} = worldToScreen(b.x,b.y);
  const r = b.radius * zoom;
  ctx.save();
  const grad = ctx.createRadialGradient(x,y,0,x,y,r*2.2);
  grad.addColorStop(0,'#ffffff');
  grad.addColorStop(0.3,'#ffffc0');
  grad.addColorStop(0.7,'rgba(255,180,0,0.4)');
  grad.addColorStop(1,'rgba(255,120,0,0)');
  ctx.beginPath(); ctx.arc(x,y,r*2.2,0,Math.PI*2);
  ctx.fillStyle=grad; ctx.fill();

  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();

  if(showRings){
    for(let i=0;i<3;i++){
      ctx.beginPath(); ctx.arc(x,y,r*(1.4+i*0.5),0,Math.PI*2);
      ctx.strokeStyle=`rgba(255,200,80,${0.12-i*0.03})`; ctx.lineWidth=4*zoom*(1-i*0.25); ctx.stroke();
    }
  }

  const spikes=6;
  for(let i=0;i<spikes;i++){
    const a = (i/spikes)*Math.PI*2 + simTime*0.01;
    ctx.beginPath();
    ctx.moveTo(x+Math.cos(a)*r*1.1, y+Math.sin(a)*r*1.1);
    ctx.lineTo(x+Math.cos(a)*r*(2.5+Math.sin(simTime*0.05+i)*0.5), y+Math.sin(a)*r*(2.5+Math.sin(simTime*0.05+i)*0.5));
    ctx.strokeStyle=`rgba(255,220,80,0.25)`; ctx.lineWidth=2*zoom; ctx.stroke();
  }
  ctx.restore();
}

function drawPlanet(b){
  const {x,y} = worldToScreen(b.x,b.y);
  const r = b.radius * zoom;
  ctx.save();

  const grad = ctx.createRadialGradient(x-r*0.3,y-r*0.3,0,x,y,r);
  grad.addColorStop(0,'#ffffff88');
  grad.addColorStop(0.4,b.color);
  grad.addColorStop(1,b.color+'55');
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=grad; ctx.fill();

  if(b.rings && showRings){
    ctx.save();
    ctx.translate(x,y);
    ctx.scale(1, Math.cos(b.ringTilt)*0.45+0.1);
    ctx.beginPath();
    ctx.arc(0,0,r+b.ringWidth*zoom,0,Math.PI*2);
    ctx.arc(0,0,r*1.25,0,Math.PI*2,true);
    ctx.fillStyle=b.ringColor; ctx.fill();
    ctx.restore();
  }
  if(selected===b.id){
    ctx.beginPath(); ctx.arc(x,y,r+5,0,Math.PI*2);
    ctx.strokeStyle='rgba(100,180,255,0.8)'; ctx.lineWidth=1.5; ctx.stroke();
  }
  ctx.restore();
}

function drawBlackHole(b){
  const {x,y} = worldToScreen(b.x,b.y);
  const r = b.radius * zoom;
  ctx.save();
  b.spinAngle += 0.03;

  const layers = 5;
  for(let i=layers;i>=0;i--){
    const grad = ctx.createRadialGradient(x,y,0,x,y,r*(1.5+i*0.7));
    if(i===layers){
      grad.addColorStop(0,'rgba(0,0,0,1)');
      grad.addColorStop(0.5,'rgba(255,80,0,0.25)');
      grad.addColorStop(1,'rgba(255,40,0,0)');
    } else {
      grad.addColorStop(0,'rgba(0,0,0,0)');
      grad.addColorStop(0.7,`rgba(180,${50+i*30},255,${0.08-i*0.01})`);
      grad.addColorStop(1,'rgba(0,0,0,0)');
    }
    ctx.beginPath(); ctx.arc(x,y,r*(1.5+i*0.7),0,Math.PI*2);
    ctx.fillStyle=grad; ctx.fill();
  }

  for(let i=0;i<6;i++){
    const a = b.spinAngle + i*Math.PI/3;
    const r2=r*2.2, r3=r*3.8;
    ctx.beginPath();
    ctx.moveTo(x+Math.cos(a)*r2,y+Math.sin(a)*r2*0.3);
    ctx.quadraticCurveTo(x+Math.cos(a+0.4)*r3*0.6,y+Math.sin(a+0.4)*r3*0.2,
      x+Math.cos(a+0.8)*r3,y+Math.sin(a+0.8)*r3*0.3);
    ctx.strokeStyle=`rgba(255,${100+i*20},0,0.5)`; ctx.lineWidth=2.5*zoom; ctx.stroke();
  }

  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle='#000'; ctx.fill();
  ctx.strokeStyle='rgba(255,60,0,0.7)'; ctx.lineWidth=2; ctx.stroke();
  ctx.restore();
}

function drawAsteroid(b){
  const {x,y} = worldToScreen(b.x,b.y);
  const r = b.radius*zoom;
  ctx.save();
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle='#888'; ctx.fill();
  ctx.restore();
}

function drawComet(b){
  const {x,y} = worldToScreen(b.x,b.y);
  const r = b.radius*zoom;
  const spd = Math.sqrt(b.vx*b.vx+b.vy*b.vy);
  const tx = -b.vx/spd, ty = -b.vy/spd;
  ctx.save();
  const grad = ctx.createLinearGradient(x,y,x+tx*60*zoom,y+ty*60*zoom);
  grad.addColorStop(0,'rgba(150,255,255,0.9)');
  grad.addColorStop(1,'rgba(150,255,255,0)');
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(x+tx*60*zoom,y+ty*60*zoom);
  ctx.strokeStyle=grad; ctx.lineWidth=r*1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle='#ccffff'; ctx.fill();
  ctx.restore();
}

function drawTrail(b){
  if(!showTrails||b.trail.length<2) return;
  ctx.save();
  ctx.beginPath();
  const p0 = worldToScreen(b.trail[0].x, b.trail[0].y);
  ctx.moveTo(p0.x,p0.y);
  for(let i=1;i<b.trail.length;i++){
    const p = worldToScreen(b.trail[i].x, b.trail[i].y);
    ctx.lineTo(p.x,p.y);
  }
  ctx.strokeStyle = b.type==='star'?'rgba(255,200,80,0.2)':
    b.type==='blackhole'?'rgba(255,60,0,0.2)':
    b.color+'44';
  ctx.lineWidth=1; ctx.stroke();
  ctx.restore();
}

function drawPhoton(p){
  const {x,y} = worldToScreen(p.x,p.y);
  ctx.save();
  ctx.beginPath(); ctx.arc(x,y,2.5*zoom,0,Math.PI*2);
  ctx.fillStyle=p.color; ctx.globalAlpha=p.life*0.9; ctx.fill();
  ctx.restore();
}

function drawGravityLines(){
  const stars = bodies.filter(b=>b.type==='star'||b.type==='blackhole');
  stars.forEach(star=>{
    for(let ring=1;ring<=4;ring++){
      const {x,y} = worldToScreen(star.x,star.y);
      const r = ring*100*zoom;
      ctx.save();
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.strokeStyle=star.type==='blackhole'?`rgba(255,60,0,${0.12-ring*0.025})`:`rgba(255,200,80,${0.1-ring*0.02})`;
      ctx.lineWidth=0.5; ctx.setLineDash([6,8]);
      ctx.stroke(); ctx.restore();
    }
  });
}

function drawExplosions(){
  for(let i=explosions.length-1;i>=0;i--){
    const ex=explosions[i];
    const {x,y}=worldToScreen(ex.x,ex.y);
    ex.t+=0.04;
    if(ex.t>1){explosions.splice(i,1);continue;}
    ctx.save();
    const r=ex.maxR*ex.t*zoom;
    const grad=ctx.createRadialGradient(x,y,0,x,y,r);
    grad.addColorStop(0,`rgba(255,255,200,${1-ex.t})`);
    grad.addColorStop(0.4,`rgba(255,100,0,${(1-ex.t)*0.8})`);
    grad.addColorStop(1,'rgba(255,50,0,0)');
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=grad; ctx.fill();
    ctx.restore();
  }
}

function physics(){
  const dt = 0.016 * timeSpeed;
  simTime += dt;

  const G = 0.3;
  const n = bodies.length;
  for(let i=0;i<n;i++){
    const a=bodies[i];
    if(a.type==='star'&&bodies.filter(b=>b.type==='star').length<3) continue;
    for(let j=i+1;j<n;j++){
      const b=bodies[j];
      const dx=b.x-a.x, dy=b.y-a.y;
      const dist2=dx*dx+dy*dy;
      const dist=Math.sqrt(dist2)+0.001;
      const force=G*(a.mass*b.mass)/dist2;
      const fx=force*dx/dist, fy=force*dy/dist;
      if(a.type!=='star') { a.vx+=fx/a.mass*dt; a.vy+=fy/a.mass*dt; }
      if(b.type!=='star') { b.vx-=fx/b.mass*dt; b.vy-=fy/b.mass*dt; }
      else if(a.type==='star'&&b.type==='star') {
        const fac=0.0001;
        a.vx+=fx*fac*dt; a.vy+=fy*fac*dt;
        b.vx-=fx*fac*dt; b.vy-=fy*fac*dt;
      }

      if(b.type==='blackhole'&&dist<b.radius*3){
        if(a.type!=='star'&&a.type!=='blackhole'){
          explosions.push({x:a.x,y:a.y,t:0,maxR:60});
          bodies.splice(i,1); collisions++; break;
        }
      }
      if(a.type==='blackhole'&&dist<a.radius*3){
        if(b.type!=='star'&&b.type!=='blackhole'){
          explosions.push({x:b.x,y:b.y,t:0,maxR:60});
          bodies.splice(j,1); collisions++; break;
        }
      }

      if(a.type==='star'&&b.type==='star'&&dist<(a.radius+b.radius)*1.2){
        mergeStars(a,b,i,j);
        return;
      }
    }
  }

  bodies.forEach(b=>{
    b.x+=b.vx*dt; b.y+=b.vy*dt;
    b.trail.push({x:b.x,y:b.y});
    if(b.trail.length>80) b.trail.shift();
  });

  for(let i=photons.length-1;i>=0;i--){
    const p=photons[i];
    p.x+=p.vx*timeSpeed; p.y+=p.vy*timeSpeed;
    p.age++;
    let absorbed=false;
    bodies.forEach(b=>{
      const dx=p.x-b.x,dy=p.y-b.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(b.type==='blackhole'&&dist<b.radius*4){
        const pull=0.15*b.mass/dist2;
        p.vx-=dx*pull; p.vy-=dy*pull;
        if(dist<b.radius) absorbed=true;
      }
    });
    p.life=1-p.age/p.maxAge;
    if(p.age>p.maxAge||absorbed) photons.splice(i,1);
  }

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy;
    p.life-=0.03;
    if(p.life<=0) particles.splice(i,1);
  }
}

function mergeStars(a,b,ai,bi){
  collisions++;
  explosions.push({x:(a.x+b.x)/2,y:(a.y+b.y)/2,t:0,maxR:180});
  const newM = a.mass+b.mass;
  const ns = makeStar((a.x+b.x)/2,(a.y+b.y)/2, newM/2000);
  ns.vx=(a.vx*a.mass+b.vx*b.mass)/newM;
  ns.vy=(a.vy*a.mass+b.vy*b.mass)/newM;
  bodies.splice(Math.max(ai,bi),1);
  bodies.splice(Math.min(ai,bi),1);
  bodies.push(ns);
  setStatus('Two stars merged into a mega-star!');
}

function setStatus(msg){ document.getElementById('status').textContent=msg; }

function updateInfo(){
  document.getElementById('i-obj').textContent=bodies.length;
  document.getElementById('i-phot').textContent=photons.length;
  document.getElementById('i-time').textContent=simTime.toFixed(1)+'s';
  document.getElementById('i-zoom').textContent=zoom.toFixed(2)+'x';
  document.getElementById('i-col').textContent=collisions;
  document.getElementById('i-mode').textContent=showGrav?'Gravity':'Normal';
  const sel=bodies.find(b=>b.id===selected);
  document.getElementById('i-sel').textContent=sel?sel.name:'—';
}

let lastPhotonSpawn=0;
function loop(ts){
  requestAnimationFrame(loop);
  if(ts-lastPhotonSpawn>500/timeSpeed){
    spawnPhotons();
    lastPhotonSpawn=ts;
  }
  physics();

  ctx.clearRect(0,0,W,H);

  ctx.save();
  for(let y2=-2;y2<H+50;y2+=55){
    for(let x2=-2;x2<W+50;x2+=55){
      const size=Math.random()>0.97?2:1;
      ctx.fillStyle=`rgba(255,255,255,${0.2+Math.random()*0.6})`;
      ctx.fillRect(x2+Math.random()*20-10,y2+Math.random()*20-10,size,size);
    }
  }
  ctx.restore();

  if(showGrav) drawGravityLines();

  bodies.forEach(b=>drawTrail(b));
  bodies.forEach(b=>{
    if(b.type==='star') drawStar(b);
    else if(b.type==='planet') drawPlanet(b);
    else if(b.type==='blackhole') drawBlackHole(b);
    else if(b.type==='asteroid') drawAsteroid(b);
    else if(b.type==='comet') drawComet(b);
  });
  photons.forEach(p=>drawPhoton(p));
  drawExplosions();

  particles.forEach(p=>{
    const {x,y}=worldToScreen(p.x,p.y);
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.beginPath(); ctx.arc(x,y,p.size,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.fill(); ctx.restore();
  });

  updateInfo();
}
requestAnimationFrame(loop);

const spdSlider=document.getElementById('spd');
const photSlider=document.getElementById('phot');
const zoomSlider=document.getElementById('zoom');
spdSlider.addEventListener('input',e=>{timeSpeed=+e.target.value;document.getElementById('spd-v').textContent=timeSpeed.toFixed(1)+'x';});
photSlider.addEventListener('input',e=>{photonCount=+e.target.value;document.getElementById('phot-v').textContent=photonCount;});
zoomSlider.addEventListener('input',e=>{zoom=+e.target.value;document.getElementById('zoom-v').textContent=zoom.toFixed(1)+'x';});

document.getElementById('btn-rings').addEventListener('click',function(){showRings=!showRings;this.classList.toggle('active',showRings);});
document.getElementById('btn-trails').addEventListener('click',function(){showTrails=!showTrails;this.classList.toggle('active',showTrails);});
document.getElementById('btn-grav').addEventListener('click',function(){showGrav=!showGrav;this.classList.toggle('active',showGrav);});
document.getElementById('btn-reset').addEventListener('click',()=>{initSystem();setStatus('System reset.');});

document.getElementById('btn-add').addEventListener('click',()=>{
  const type=document.getElementById('add-sel').value;
  const cx=screenToWorld(W/2,H/2);
  if(type==='star'){
    const s=makeStar(cx.x+(Math.random()-0.5)*100,cx.y+(Math.random()-0.5)*100,0.8);
    s.vx=(Math.random()-0.5)*0.5; s.vy=(Math.random()-0.5)*0.5;
    bodies.push(s); setStatus('Star added!');
  } else if(type==='blackhole'){
    bodies.push(makeBlackHole(cx.x+(Math.random()-0.5)*200,cx.y+(Math.random()-0.5)*200,1.2));
    setStatus('Black hole spawned!');
  } else if(type==='planet'){
    const stars=bodies.filter(b=>b.type==='star');
    if(stars.length){
      const star=stars[0];
      bodies.push(makePlanet(star,Math.random()*Math.PI*2,120+Math.random()*200,1));
      setStatus('Planet added!');
    }
  } else if(type==='asteroid'){
    const stars=bodies.filter(b=>b.type==='star');
    if(stars.length){
      bodies.push(makeAsteroid(stars[0],Math.random()*Math.PI*2,100+Math.random()*250));
      setStatus('Asteroid belt member added!');
    }
  } else if(type==='comet'){
    bodies.push(makeComet(cx.x+200*(Math.random()>.5?1:-1),cx.y+200*(Math.random()>.5?1:-1)));
    setStatus('Comet incoming!');
  }
});

document.getElementById('btn-supernova').addEventListener('click',()=>{
  const stars=bodies.filter(b=>b.type==='star');
  if(!stars.length){setStatus('No stars to go supernova!');return;}
  const star=stars[Math.floor(Math.random()*stars.length)];
  explosions.push({x:star.x,y:star.y,t:0,maxR:300});
  const bh=makeBlackHole(star.x,star.y,1.5);
  bh.vx=star.vx; bh.vy=star.vy;
  const idx=bodies.indexOf(star);
  bodies.splice(idx,1,bh);
  for(let i=0;i<20;i++){
    const a=Math.random()*Math.PI*2;
    emitParticle(star.x,star.y,'#ff8800',Math.cos(a)*3,Math.sin(a)*3);
  }
  setStatus('Supernova! Star collapsed into a black hole.');
});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const factor=e.deltaY<0?1.12:0.89;
  zoom=Math.max(0.3,Math.min(4,zoom*factor));
  zoomSlider.value=zoom;
  document.getElementById('zoom-v').textContent=zoom.toFixed(1)+'x';
  document.getElementById('i-zoom').textContent=zoom.toFixed(2)+'x';
},{passive:false});

canvas.addEventListener('mousedown',e=>{
  if(e.button===1){isPanning=true;panStart={x:e.clientX,y:e.clientY};panOrig={x:panX,y:panY};return;}
  if(e.button===2){
    const wpos=screenToWorld(e.offsetX,e.offsetY);
    for(let i=bodies.length-1;i>=0;i--){
      const b=bodies[i];
      const dx=b.x-wpos.x,dy=b.y-wpos.y;
      if(Math.sqrt(dx*dx+dy*dy)<b.radius+8){
        bodies.splice(i,1); setStatus('Object removed.'); return;
      }
    }
    return;
  }
  const wpos=screenToWorld(e.offsetX,e.offsetY);
  for(let i=bodies.length-1;i>=0;i--){
    const b=bodies[i];
    const dx=b.x-wpos.x,dy=b.y-wpos.y;
    if(Math.sqrt(dx*dx+dy*dy)<b.radius+10){
      selected=b.id; dragging=true;
      dragStart={x:e.offsetX,y:e.offsetY};
      return;
    }
  }
  selected=null;
  isPanning=true; panStart={x:e.clientX,y:e.clientY}; panOrig={x:panX,y:panY};
});

canvas.addEventListener('mousemove',e=>{
  if(isPanning){
    panX=panOrig.x+(e.clientX-panStart.x)/zoom;
    panY=panOrig.y+(e.clientY-panStart.y)/zoom;
    return;
  }
  if(dragging&&selected!==null){
    const b=bodies.find(b=>b.id===selected);
    if(b){
      const wpos=screenToWorld(e.offsetX,e.offsetY);
      b.x=wpos.x; b.y=wpos.y; b.vx=0; b.vy=0;
    }
  }
  const wpos=screenToWorld(e.offsetX,e.offsetY);
  const tip=document.getElementById('tooltip');
  for(let i=bodies.length-1;i>=0;i--){
    const b=bodies[i];
    const dx=b.x-wpos.x,dy=b.y-wpos.y;
    if(Math.sqrt(dx*dx+dy*dy)<b.radius+8){
      tip.style.display='block';
      tip.style.left=(e.offsetX+14)+'px';
      tip.style.top=(e.offsetY-10)+'px';
      const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy).toFixed(2);
      tip.innerHTML=`<b>${b.name}</b><br>Type: ${b.type}<br>Mass: ${b.mass.toFixed(0)}<br>Speed: ${spd} u/s`;
      return;
    }
  }
  tip.style.display='none';
});

canvas.addEventListener('mouseup',e=>{
  if(e.button===1){isPanning=false;return;}
  dragging=false; isPanning=false;
});

canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('mouseleave',()=>{dragging=false;isPanning=false;});

setStatus('System initialized. Scroll=zoom, drag=pan, right-click=remove');
</script>
